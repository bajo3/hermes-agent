services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hermes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hermes"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/hermes}
      SECRET_KEY: ${SECRET_KEY:-change_me}
      ENV: ${ENV:-development}
      TIMEZONE: ${TIMEZONE:-America/Argentina/Buenos_Aires}
      ADMIN_WHATSAPP_NUMBER: ${ADMIN_WHATSAPP_NUMBER:-}
      WHATSAPP_BRIDGE_TOKEN: ${WHATSAPP_BRIDGE_TOKEN:-change_me_bridge_token}
      BRIDGE_URL: ${BRIDGE_URL:-http://host.docker.internal:8765}
      BRIDGE_TOKEN: ${BRIDGE_TOKEN:-change_me_windows_bridge_token}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      DEFAULT_CLIENTS_FOLDER: ${DEFAULT_CLIENTS_FOLDER:-C:\Hermes\Clientes}
      DEFAULT_BACKUP_FOLDER: ${DEFAULT_BACKUP_FOLDER:-C:\Hermes\Backups}
      DEFAULT_EXPORTS_FOLDER: ${DEFAULT_EXPORTS_FOLDER:-C:\Hermes\Exports}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      AI_ENABLED: ${AI_ENABLED:-true}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_HISTORY_MESSAGES: ${AI_HISTORY_MESSAGES:-12}
      AI_HISTORY_MINUTES: ${AI_HISTORY_MINUTES:-30}
      HERMES_CLI_PATH: ${HERMES_CLI_PATH:-/home/bajo31/.local/bin/hermes}
      HERMES_CLI_COMMAND: ${HERMES_CLI_COMMAND:-}
      HERMES_CLI_PROVIDER: ${HERMES_CLI_PROVIDER:-openai-codex}
      HERMES_CLI_MODEL: ${HERMES_CLI_MODEL:-gpt-5.5}
      HERMES_CLI_TIMEOUT: ${HERMES_CLI_TIMEOUT:-120}
      HERMES_CLI_CWD: ${HERMES_CLI_CWD:-/home/bajo31/.hermes/hermes-agent}
      HERMES_CLI_BRIDGE_URL: ${HERMES_CLI_BRIDGE_URL:-http://host.docker.internal:8766/interpret}
      HERMES_CLI_BRIDGE_TOKEN: ${HERMES_CLI_BRIDGE_TOKEN:-}
      PORT: 8000
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build: .
    depends_on:
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/hermes}
      SECRET_KEY: ${SECRET_KEY:-change_me}
      ENV: ${ENV:-development}
      TIMEZONE: ${TIMEZONE:-America/Argentina/Buenos_Aires}
    command: python -m app.worker

  whatsapp_bridge:
    build: ./whatsapp_bridge
    depends_on:
      api:
        condition: service_healthy
    environment:
      HERMES_API_URL: ${HERMES_API_URL:-http://api:8000}
      ADMIN_WHATSAPP_NUMBER: ${ADMIN_WHATSAPP_NUMBER:-}
      WHATSAPP_BRIDGE_TOKEN: ${WHATSAPP_BRIDGE_TOKEN:-change_me_bridge_token}
      WHATSAPP_AUTH_DIR: /app/auth
      WHATSAPP_LOG_FILE: /app/logs/messages.log
    volumes:
      - ./whatsapp_bridge/auth:/app/auth
      - ./whatsapp_bridge/logs:/app/logs
    command: npm start

volumes:
  postgres_data:
